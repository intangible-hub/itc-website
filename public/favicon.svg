<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
  <!-- Hexagon body -->
  <path d="M24 3 L42 13.5 L42 34.5 L24 45 L6 34.5 L6 13.5 Z"
        fill="#0A1628" stroke="#0066FF" stroke-width="1.5"/>
  <!-- Circuit traces from center -->
  <line x1="24" y1="24" x2="24" y2="13" stroke="#0066FF" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="24" y1="24" x2="33" y2="29" stroke="#0066FF" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="24" y1="24" x2="15" y2="29" stroke="#0066FF" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Nodes -->
  <circle cx="24" cy="13" r="2.2" fill="#0066FF"/>
  <circle cx="33" cy="29" r="2.2" fill="#0066FF"/>
  <circle cx="15" cy="29" r="2.2" fill="#0066FF"/>
  <!-- Centre node -->
  <circle cx="24" cy="24" r="3.5" fill="#0066FF" opacity="0.9"/>
  <circle cx="24" cy="24" r="1.8" fill="#E0EEFF"/>
</svg>
